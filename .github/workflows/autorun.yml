name: Steam Discount Auto Run

on:
  schedule:
    # 每半小时运行一次（可自行调整，比如 0 * * * * 每小时）
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 手动触发开关

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码到运行环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 兼容项目的 Python 版本

      # 步骤3：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：运行主程序（生成 docs 目录的静态页面）
      - name: Run main.py
        env:
          # 读取你配置的 Secrets 环境变量
          PAGES: ${{ secrets.PAGES }}
          ZONE: ${{ secrets.ZONE }}
          LIMIT: ${{ secrets.LIMIT }}
          FILTER: ${{ secrets.FILTER }}
        run: |
          python main.py

      # 步骤5：将 docs 目录推送到 gh-pages 分支（核心缺失步骤）
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动生成的令牌，无需手动配置
          publish_dir: ./docs  # 指定要发布的目录（项目生成的静态页面在 docs 里）
          publish_branch: gh-pages  # 推送到 gh-pages 分支
          force_orphan: true  # 强制覆盖 gh-pages 分支（避免历史冲突）
